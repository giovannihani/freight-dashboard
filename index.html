<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🚢 Freight Rate Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">

const SK="freight-v6";
const emptyForm={forwarder:"",forwarderCode:"",line:"",lineCode:"",pol:"",pod:"",freight20:"",freight40hq:"",thc20:"",thc40hq:"",qty20:"",qty40hq:"",otherCharges:"",currency:"USD",etd:"",cutoff:"",validityDate:"",freeDays:"",transitTime:"",remarks:""};
const emptyFwd={id:"",code:"",name:"",contact:"",email:"",phone:"",notes:""};
const emptyLine={id:"",code:"",name:"",routes:"",freeDays:"",thcStandard:"",notes:""};
const currencies=["USD","EGP","EUR","CNY"];

function calcTotal(r,type="20"){
  const f=parseFloat(type==="20"?r.freight20:r.freight40hq)||0;
  const t=parseFloat(type==="20"?r.thc20:r.thc40hq)||0;
  const o=parseFloat(r.otherCharges)||0;
  const q=parseInt(type==="20"?r.qty20:r.qty40hq)||1;
  return (f+t)*q+o;
}
function calcGrand(r){
  const f20=parseFloat(r.freight20)||0,t20=parseFloat(r.thc20)||0;
  const f40=parseFloat(r.freight40hq)||0,t40=parseFloat(r.thc40hq)||0;
  const q20=parseInt(r.qty20)||0,q40=parseInt(r.qty40hq)||0;
  return (f20+t20)*q20+(f40+t40)*q40+(parseFloat(r.otherCharges)||0);
}
function Field({label,color="text-gray-500",children}){
  return <div><label className={`text-xs font-medium ${color}`}>{label}</label>{children}</div>;
}
function Modal({title,onClose,children}){
  return(
    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-screen overflow-y-auto">
        <div className="flex items-center justify-between p-5 border-b">
          <h2 className="text-base font-bold text-gray-800">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-red-500 text-xl font-bold">✕</button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}

function App(){
  const [data,setData]=React.useState({quotes:[],drafts:[],forwarders:[],lines:[]});
  const [tab,setTab]=React.useState("dashboard");
  const [form,setForm]=React.useState({...emptyForm});
  const [formMode,setFormMode]=React.useState(null);
  const [editId,setEditId]=React.useState(null);
  const [editDraftId,setEditDraftId]=React.useState(null);
  const [sortBy,setSortBy]=React.useState("grand");
  const [pasteOpen,setPasteOpen]=React.useState(false);
  const [pasteText,setPasteText]=React.useState("");
  const [parsing,setParsing]=React.useState(false);
  const [parseError,setParseError]=React.useState("");
  const [parsed,setParsed]=React.useState(null);
  const [apiKey,setApiKey]=React.useState(()=>localStorage.getItem("gemini_key")||"");
  const [showKeyModal,setShowKeyModal]=React.useState(false);
  const [fwdModal,setFwdModal]=React.useState(null); // null | 'new' | fwd object
  const [lineModal,setLineModal]=React.useState(null);
  const [fwdForm,setFwdForm]=React.useState({...emptyFwd});
  const [lineForm,setLineForm]=React.useState({...emptyLine});
  const [historyModal,setHistoryModal]=React.useState(null); // {type:'fwd'|'line', id}
  const formRef=React.useRef(null);

  React.useEffect(()=>{
    try{const s=localStorage.getItem(SK);if(s){const d=JSON.parse(s);setData({quotes:d.quotes||[],drafts:d.drafts||[],forwarders:d.forwarders||[],lines:d.lines||[]});}}catch{}
  },[]);

  const persist=(patch)=>{
    const nd={...data,...patch};
    setData(nd);
    try{localStorage.setItem(SK,JSON.stringify(nd));}catch{}
  };

  const inp="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400";
  const upd=(k,v)=>setForm(p=>({...p,[k]:v}));
  const resetForm=()=>{setForm({...emptyForm});setEditId(null);setEditDraftId(null);setFormMode(null);};
  const openForm=(mode,targetTab)=>{resetForm();setTab(targetTab);setFormMode(mode);setTimeout(()=>formRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),100);};

  const enrichQ=(f,id)=>({...f,id:id||Date.now(),date:f.date||new Date().toISOString().slice(0,10),total20:calcTotal(f,"20"),total40:calcTotal(f,"40"),grand:calcGrand(f)});

  const handleSaveQuote=()=>{
    if(!form.forwarder.trim()){alert("Forwarder is required.");return;}
    const rec=enrichQ(form,editId);
    persist({quotes:editId?data.quotes.map(q=>q.id===editId?rec:q):[...data.quotes,rec]});
    resetForm();setTab("dashboard");
  };
  const handleSaveDraft=()=>{
    if(!form.forwarder.trim()&&!form.line.trim()){alert("Enter forwarder or line.");return;}
    const rec=enrichQ(form,editDraftId);
    persist({drafts:editDraftId?data.drafts.map(d=>d.id===editDraftId?rec:d):[...data.drafts,rec]});
    resetForm();setTab("drafts");
  };
  const promoteDraft=(d)=>{
    persist({quotes:[...data.quotes,enrichQ(d,Date.now())],drafts:data.drafts.filter(x=>x.id!==d.id)});
    setTab("dashboard");
  };
  const editQuote=(q)=>{setForm({...emptyForm,...q});setEditId(q.id);setFormMode("draft");setTab("dashboard");setTimeout(()=>formRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),100);};
  const editDraft=(d)=>{setForm({...emptyForm,...d});setEditDraftId(d.id);setFormMode("draft");setTab("drafts");setTimeout(()=>formRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),100);};

  // Forwarder CRUD
  const saveFwd=()=>{
    if(!fwdForm.name.trim()){alert("Name required.");return;}
    const rec={...fwdForm,id:fwdForm.id||Date.now()};
    persist({forwarders:fwdForm.id?data.forwarders.map(f=>f.id===fwdForm.id?rec:f):[...data.forwarders,rec]});
    setFwdModal(null);setFwdForm({...emptyFwd});
  };
  const deleteFwd=(id)=>{if(window.confirm("Delete forwarder?"))persist({forwarders:data.forwarders.filter(f=>f.id!==id)});};
  const openEditFwd=(f)=>{setFwdForm({...f});setFwdModal("edit");};

  // Line CRUD
  const saveLine=()=>{
    if(!lineForm.name.trim()){alert("Name required.");return;}
    const rec={...lineForm,id:lineForm.id||Date.now()};
    persist({lines:lineForm.id?data.lines.map(l=>l.id===lineForm.id?rec:l):[...data.lines,rec]});
    setLineModal(null);setLineForm({...emptyLine});
  };
  const deleteLine=(id)=>{if(window.confirm("Delete line?"))persist({lines:data.lines.filter(l=>l.id!==id)});};
  const openEditLine=(l)=>{setLineForm({...l});setLineModal("edit");};

  // Quotes sorted
  const sorted=[...data.quotes].map(q=>({...q,total20:calcTotal(q,"20"),total40:calcTotal(q,"40"),grand:calcGrand(q)}))
    .sort((a,b)=>sortBy==="grand"?a.grand-b.grand:sortBy==="total20"?a.total20-b.total20:sortBy==="total40"?a.total40-b.total40:sortBy==="etd"?(a.etd||"").localeCompare(b.etd||""):(a.transitTime||0)-(b.transitTime||0));
  const bestGrandId=sorted.filter(q=>q.grand>0).sort((a,b)=>a.grand-b.grand)[0]?.id;
  const best20Id=sorted.filter(q=>q.total20>0).sort((a,b)=>a.total20-b.total20)[0]?.id;
  const best40Id=sorted.filter(q=>q.total40>0).sort((a,b)=>a.total40-b.total40)[0]?.id;

  // History helpers
  const getFwdHistory=(fwdName)=>data.quotes.filter(q=>q.forwarder===fwdName).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const getLineHistory=(lineName)=>data.quotes.filter(q=>q.line===lineName).sort((a,b)=>(b.date||"").localeCompare(a.date||""));

  // AI Parse
  const handleParse=async()=>{
    if(!pasteText.trim())return;
    if(!apiKey){setShowKeyModal(true);return;}
    setParsing(true);setParseError("");setParsed(null);
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:`Extract freight quote data from the text and return ONLY a JSON array. Keys: forwarder, forwarderCode, line, lineCode, pol, pod, freight20, freight40hq, thc20, thc40hq, qty20, qty40hq, otherCharges, currency (default USD), etd (YYYY-MM-DD), cutoff (YYYY-MM-DD), validityDate (YYYY-MM-DD), freeDays, transitTime, remarks. Empty string if not found. Raw JSON only, no markdown.\n\n${pasteText}`}]}]})
      });
      const d=await res.json();
      const text=d.candidates?.[0]?.content?.parts?.[0]?.text||"";
      if(!text)throw new Error();
      const clean=text.replace(/```json/gi,"").replace(/```/g,"").trim();
      const s=clean.indexOf("["),e=clean.lastIndexOf("]");
      if(s===-1||e===-1)throw new Error();
      const arr=JSON.parse(clean.slice(s,e+1));
      if(!Array.isArray(arr))throw new Error();
      setParsed(arr.map(q=>({...emptyForm,...q,id:Date.now()+Math.random(),date:new Date().toISOString().slice(0,10),total20:calcTotal(q,"20"),total40:calcTotal(q,"40"),grand:calcGrand(q)})));
    }catch{setParseError("Could not parse. Check your input or API key.");}
    setParsing(false);
  };
  const confirmParsed=(asDraft=false)=>{
    if(!parsed)return;
    if(asDraft)persist({drafts:[...data.drafts,...parsed]});
    else persist({quotes:[...data.quotes,...parsed]});
    setParsed(null);setPasteText("");setPasteOpen(false);
  };

  // Export
  const exportCSV=()=>{
    const cols=["#","Date","Forwarder","Fwd Code","Line","Line Code","POL","POD","Qty20","20Rate","20THC","Tot20","Qty40","40Rate","40THC","Tot40","Other","Grand","CCY","ETD","Cutoff","FreeDays","Transit","Validity","Remarks"];
    const rows=sorted.map((q,i)=>[i+1,q.date||"",q.forwarder,q.forwarderCode||"",q.line||"",q.lineCode||"",q.pol||"",q.pod||"",q.qty20||"",q.freight20||"",q.thc20||"",q.total20||"",q.qty40hq||"",q.freight40hq||"",q.thc40hq||"",q.total40||"",q.otherCharges||"",q.grand||"",q.currency,q.etd||"",q.cutoff||"",q.freeDays||"",q.transitTime||"",q.validityDate||"",q.remarks||""]);
    const csv=[cols,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="freight_rates.csv";a.click();
  };

  const FormPanel=({mode})=>(
    <div className={`bg-white rounded-2xl shadow-md p-5 mb-5 border ${mode==="draft"?"border-yellow-200":"border-blue-100"}`}>
      <div className="flex items-center justify-between mb-4">
        <h2 className="text-base font-bold text-gray-700">{editDraftId?"✏️ Edit Draft":editId?"✏️ Edit Quote":"📝 New Draft"}</h2>
        <button onClick={resetForm} className="text-gray-400 hover:text-red-500 text-xl">✕</button>
      </div>
      <div className="grid grid-cols-2 gap-3 md:grid-cols-4">
        {/* Forwarder */}
        <div className="col-span-2">
          <Field label="Forwarder Name *">
            <input list="fwd-list" className={inp} value={form.forwarder} onChange={e=>{upd("forwarder",e.target.value);const f=data.forwarders.find(x=>x.name===e.target.value);if(f)setForm(p=>({...p,forwarder:f.name,forwarderCode:f.code}));}} placeholder="e.g. Transmar"/>
            <datalist id="fwd-list">{data.forwarders.map(f=><option key={f.id} value={f.name}/>)}</datalist>
          </Field>
        </div>
        <div className="col-span-1"><Field label="Forwarder Code"><input className={inp} value={form.forwarderCode} onChange={e=>upd("forwarderCode",e.target.value)} placeholder="e.g. TRM"/></Field></div>
        <div className="col-span-1"><Field label="Date"><input type="date" className={inp} value={form.date||new Date().toISOString().slice(0,10)} onChange={e=>upd("date",e.target.value)}/></Field></div>
        {/* Line */}
        <div className="col-span-2">
          <Field label="Shipping Line">
            <input list="line-list" className={inp} value={form.line} onChange={e=>{upd("line",e.target.value);const l=data.lines.find(x=>x.name===e.target.value);if(l)setForm(p=>({...p,line:l.name,lineCode:l.code,freeDays:l.freeDays||p.freeDays}));}} placeholder="e.g. MSC"/>
            <datalist id="line-list">{data.lines.map(l=><option key={l.id} value={l.name}/>)}</datalist>
          </Field>
        </div>
        <div className="col-span-1"><Field label="Line Code"><input className={inp} value={form.lineCode} onChange={e=>upd("lineCode",e.target.value)} placeholder="e.g. MSC"/></Field></div>
        <div className="col-span-1"><Field label="Free Days"><input type="number" className={inp} value={form.freeDays} onChange={e=>upd("freeDays",e.target.value)} placeholder="14"/></Field></div>
        {/* POL/POD */}
        <div className="col-span-1"><Field label="POL"><input className={inp} value={form.pol} onChange={e=>upd("pol",e.target.value)} placeholder="Shanghai"/></Field></div>
        <div className="col-span-1"><Field label="POD"><input className={inp} value={form.pod} onChange={e=>upd("pod",e.target.value)} placeholder="Alexandria"/></Field></div>
        {/* 20ft */}
        <Field label="Qty 20ft" color="text-blue-600 font-bold"><input type="number" className={inp} value={form.qty20} onChange={e=>upd("qty20",e.target.value)} placeholder="0"/></Field>
        <Field label="20ft Rate" color="text-blue-600 font-bold"><input type="number" className={inp} value={form.freight20} onChange={e=>upd("freight20",e.target.value)} placeholder="0"/></Field>
        <Field label="20ft THC" color="text-blue-600 font-bold"><input type="number" className={inp} value={form.thc20} onChange={e=>upd("thc20",e.target.value)} placeholder="0"/></Field>
        <div className="bg-blue-50 rounded-lg px-3 py-2 flex flex-col justify-center">
          <span className="text-xs text-blue-500">Total 20ft</span>
          <span className="font-bold text-blue-700">{calcTotal(form,"20").toLocaleString()} {form.currency}</span>
        </div>
        {/* 40HQ */}
        <Field label="Qty 40HQ" color="text-purple-600 font-bold"><input type="number" className={inp} value={form.qty40hq} onChange={e=>upd("qty40hq",e.target.value)} placeholder="0"/></Field>
        <Field label="40HQ Rate" color="text-purple-600 font-bold"><input type="number" className={inp} value={form.freight40hq} onChange={e=>upd("freight40hq",e.target.value)} placeholder="0"/></Field>
        <Field label="40HQ THC" color="text-purple-600 font-bold"><input type="number" className={inp} value={form.thc40hq} onChange={e=>upd("thc40hq",e.target.value)} placeholder="0"/></Field>
        <div className="bg-purple-50 rounded-lg px-3 py-2 flex flex-col justify-center">
          <span className="text-xs text-purple-500">Total 40HQ</span>
          <span className="font-bold text-purple-700">{calcTotal(form,"40").toLocaleString()} {form.currency}</span>
        </div>
        {/* Other */}
        <Field label="Other Charges"><input type="number" className={inp} value={form.otherCharges} onChange={e=>upd("otherCharges",e.target.value)} placeholder="0"/></Field>
        <Field label="Currency"><select className={inp} value={form.currency} onChange={e=>upd("currency",e.target.value)}>{currencies.map(c=><option key={c}>{c}</option>)}</select></Field>
        <Field label="ETD"><input type="date" className={inp} value={form.etd} onChange={e=>upd("etd",e.target.value)}/></Field>
        <Field label="Cutoff"><input type="date" className={inp} value={form.cutoff} onChange={e=>upd("cutoff",e.target.value)}/></Field>
        <Field label="Validity"><input type="date" className={inp} value={form.validityDate} onChange={e=>upd("validityDate",e.target.value)}/></Field>
        <Field label="Transit (days)"><input type="number" className={inp} value={form.transitTime} onChange={e=>upd("transitTime",e.target.value)} placeholder="30"/></Field>
        <div className="col-span-2 md:col-span-4"><Field label="Remarks"><input className={inp} value={form.remarks} onChange={e=>upd("remarks",e.target.value)} placeholder="Special conditions..."/></Field></div>
      </div>
      <div className="mt-4 flex items-center gap-3 flex-wrap">
        <div className="bg-gray-800 text-white rounded-lg px-4 py-2">
          <div className="text-xs text-gray-300">Grand Total</div>
          <div className="text-lg font-bold">{calcGrand(form).toLocaleString()} {form.currency}</div>
        </div>
        <div className="flex gap-2 ml-auto">
          <button onClick={handleSaveDraft} className="bg-yellow-400 hover:bg-yellow-500 text-white text-sm font-semibold px-4 py-2 rounded-lg">{editDraftId?"Update Draft":"💾 Save Draft"}</button>
          <button onClick={handleSaveQuote} className="bg-green-600 hover:bg-green-700 text-white text-sm font-semibold px-4 py-2 rounded-lg">{editId?"Update Quote":"✅ Confirm Quote"}</button>
        </div>
      </div>
    </div>
  );

  // History Modal content
  const HistoryContent=()=>{
    if(!historyModal)return null;
    const isFwd=historyModal.type==="fwd";
    const profile=isFwd?data.forwarders.find(f=>f.id===historyModal.id):data.lines.find(l=>l.id===historyModal.id);
    const qs=isFwd?getFwdHistory(profile?.name):getLineHistory(profile?.name);
    return(
      <div>
        <div className="grid grid-cols-2 gap-2 mb-4 text-sm">
          <div><span className="text-gray-400">Code:</span> <b>{profile?.code||"—"}</b></div>
          {isFwd?(
            <>
              <div><span className="text-gray-400">Contact:</span> <b>{profile?.contact||"—"}</b></div>
              <div><span className="text-gray-400">Email:</span> <b>{profile?.email||"—"}</b></div>
              <div><span className="text-gray-400">Phone:</span> <b>{profile?.phone||"—"}</b></div>
            </>
          ):(
            <>
              <div><span className="text-gray-400">Routes:</span> <b>{profile?.routes||"—"}</b></div>
              <div><span className="text-gray-400">Free Days:</span> <b>{profile?.freeDays||"—"}</b></div>
              <div><span className="text-gray-400">Standard THC:</span> <b>{profile?.thcStandard||"—"}</b></div>
            </>
          )}
        </div>
        {profile?.notes&&<div className="bg-gray-50 rounded-lg p-3 text-sm text-gray-600 mb-4">📝 {profile.notes}</div>}
        <h3 className="text-sm font-bold text-gray-700 mb-2">📊 Rate History ({qs.length} quotes)</h3>
        {qs.length===0?<p className="text-gray-400 text-sm">No quotes yet.</p>:(
          <div className="overflow-x-auto rounded-xl border">
            <table className="w-full text-xs">
              <thead className="bg-gray-100 text-gray-600 uppercase">
                <tr>{["Date","Forwarder","Line","POL","POD","20 Rate","40HQ Rate","Grand Total","CCY","ETD"].map(h=><th key={h} className="px-2 py-2 text-left whitespace-nowrap">{h}</th>)}</tr>
              </thead>
              <tbody>
                {qs.map((q,i)=>(
                  <tr key={i} className="border-t border-gray-100 hover:bg-blue-50">
                    <td className="px-2 py-1.5 whitespace-nowrap">{q.date||"—"}</td>
                    <td className="px-2 py-1.5 font-semibold">{q.forwarder}</td>
                    <td className="px-2 py-1.5">{q.line||"—"}</td>
                    <td className="px-2 py-1.5">{q.pol||"—"}</td>
                    <td className="px-2 py-1.5">{q.pod||"—"}</td>
                    <td className="px-2 py-1.5 text-blue-700 font-medium">{q.freight20||"—"}</td>
                    <td className="px-2 py-1.5 text-purple-700 font-medium">{q.freight40hq||"—"}</td>
                    <td className="px-2 py-1.5 font-bold">{q.grand?.toLocaleString()||"—"}</td>
                    <td className="px-2 py-1.5">{q.currency}</td>
                    <td className="px-2 py-1.5 whitespace-nowrap">{q.etd||"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
        {qs.length>0&&(
          <div className="grid grid-cols-3 gap-3 mt-4">
            {[
              {label:"Lowest 20ft",val:Math.min(...qs.filter(q=>q.freight20).map(q=>parseFloat(q.freight20))).toLocaleString(),color:"text-green-700"},
              {label:"Lowest 40HQ",val:Math.min(...qs.filter(q=>q.freight40hq).map(q=>parseFloat(q.freight40hq))).toLocaleString(),color:"text-green-700"},
              {label:"Avg Grand",val:Math.round(qs.reduce((s,q)=>s+(q.grand||0),0)/qs.length).toLocaleString(),color:"text-blue-700"},
            ].map(({label,val,color})=>(
              <div key={label} className="bg-gray-50 rounded-xl p-3 text-center">
                <div className={`text-lg font-bold ${color}`}>{val}</div>
                <div className="text-xs text-gray-400">{label}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  return(
    <div className="min-h-screen bg-gray-50 p-4">
      <div className="max-w-7xl mx-auto">

        {/* API Key Modal */}
        {showKeyModal&&(
          <Modal title="🔑 Gemini API Key" onClose={()=>setShowKeyModal(false)}>
            <p className="text-xs text-gray-500 mb-3">Free from aistudio.google.com — saved in browser only.</p>
            <input className={inp} type="password" placeholder="AIzaSy..." value={apiKey} onChange={e=>setApiKey(e.target.value)}/>
            <button onClick={()=>{localStorage.setItem("gemini_key",apiKey);setShowKeyModal(false);handleParse();}}
              className="mt-3 w-full bg-blue-600 text-white text-sm font-semibold py-2 rounded-lg">Save & Parse</button>
          </Modal>
        )}

        {/* Forwarder Modal */}
        {fwdModal&&(
          <Modal title={fwdForm.id?"✏️ Edit Forwarder":"🏢 New Forwarder"} onClose={()=>{setFwdModal(null);setFwdForm({...emptyFwd});}}>
            <div className="grid grid-cols-2 gap-3">
              <div className="col-span-2"><Field label="Company Name *"><input className={inp} value={fwdForm.name} onChange={e=>setFwdForm(p=>({...p,name:e.target.value}))} placeholder="e.g. Transmar"/></Field></div>

                  {label:"Best 20ft",val:Math.min(...sorted.filter(q=>q.total20>0).map(q=>q.total20)).toLocaleString(),color:"text-blue-700",icon:"📦"},
                  {label:"Best 40HQ",val:Math.min(...sorted.filter(q=>q.total40>0).map(q=>q.total40)).toLocaleString(),color:"text-purple-700",icon:"🏗️"},
                  {label:"Avg Grand",val:Math.round(sorted.filter(q=>q.grand>0).reduce((s,q)=>s+q.grand,0)/Math.max(sorted.filter(q=>q.grand>0).length,1)).toLocaleString(),color:"text-gray-600",icon:"📊"},
                ].map(({label,val,color,icon})=>(
                  <div key={label} className="bg-white rounded-xl shadow border p-4 text-center">
                    <div className="text-xl mb-1">{icon}</div>
                    <div className={`text-xl font-bold ${color}`}>{val}</div>
                    <div className="text-xs text-gray-400 mt-1">{label}</div>
                  </div>
                ))}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
