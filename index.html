<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🚢 Freight Rate Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  body{margin:0;font-family:system-ui,sans-serif;}
  .dark body{background:#0f172a;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#475569;border-radius:3px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SK="freight-v7";
const PASSWORD="giovannihan";
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const emptyForm={forwarder:"",forwarderCode:"",line:"",lineCode:"",pol:"",pod:"",
  freight20:"",freight40hq:"",thc20:"",thc40hq:"",
  qty20:"",qty40hq:"",otherCharges:"",currency:"USD",
  etd:"",cutoff:"",validityDate:"",freeDays:"",transitTime:"",remarks:"",
  projectId:""};
const emptyFwd={id:"",code:"",name:"",contact:"",email:"",phone:"",notes:""};
const emptyLine={id:"",code:"",name:"",routes:"",freeDays:"",thc20Standard:"",thc40Standard:"",notes:""};
const emptyProject={id:"",name:"",month:"",year:"",factory:"",pol:"",pod:"",notes:"",
  requests:[]};
const emptyRequest={id:"",description:"",qty20:0,qty40:0};
const currencies=["USD","EGP","EUR","CNY"];

function calcTotal(r,type="20"){
  const f=parseFloat(type==="20"?r.freight20:r.freight40hq)||0;
  const t=parseFloat(type==="20"?r.thc20:r.thc40hq)||0;
  const q=parseInt(type==="20"?r.qty20:r.qty40hq)||0;
  return (f+t)*q;
}
function calcGrand(r){
  return calcTotal(r,"20")+calcTotal(r,"40")+(parseFloat(r.otherCharges)||0);
}

// ── Contexts ──────────────────────────────────────────
const DarkCtx=React.createContext();
function useDark(){return React.useContext(DarkCtx);}

// ── Small Components ──────────────────────────────────
function Field({label,color,children}){
  const{dark}=useDark();
  return(
    <div>
      <label className={`text-xs font-medium ${color||(dark?"text-slate-400":"text-gray-500")}`}>{label}</label>
      {children}
    </div>
  );
}

function Modal({title,onClose,wide,children}){
  const{dark}=useDark();
  return(
    <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-3">
      <div className={`rounded-2xl shadow-2xl w-full ${wide?"max-w-4xl":"max-w-2xl"} max-h-[90vh] overflow-y-auto ${dark?"bg-slate-800 text-slate-100":"bg-white text-gray-800"}`}>
        <div className={`flex items-center justify-between p-5 border-b ${dark?"border-slate-700":"border-gray-100"}`}>
          <h2 className="text-base font-bold">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-red-400 text-xl font-bold">✕</button>
        </div>
        <div className="p-5">{children}</div>
      </div>
    </div>
  );
}

function Btn({onClick,color="blue",size="sm",disabled,children,className=""}){
  const base=`font-semibold rounded-lg transition-colors disabled:opacity-40 ${size==="sm"?"text-sm px-4 py-2":"text-xs px-3 py-1.5"}`;
  const colors={
    blue:"bg-blue-600 hover:bg-blue-700 text-white",
    green:"bg-green-600 hover:bg-green-700 text-white",
    yellow:"bg-yellow-400 hover:bg-yellow-500 text-white",
    red:"bg-red-500 hover:bg-red-600 text-white",
    orange:"bg-orange-500 hover:bg-orange-600 text-white",
    teal:"bg-teal-500 hover:bg-teal-600 text-white",
    purple:"bg-purple-600 hover:bg-purple-700 text-white",
    gray:"bg-gray-200 hover:bg-gray-300 text-gray-700",
    ghost:"border border-gray-300 hover:bg-gray-50 text-gray-600",
  };
  return <button onClick={onClick} disabled={disabled} className={`${base} ${colors[color]} ${className}`}>{children}</button>;
}

// ── Chart Component ────────────────────────────────────
function TrendChart({quotes,forwarders}){
  const{dark}=useDark();
  const canvasRef=React.useRef();
  const chartRef=React.useRef();

  React.useEffect(()=>{
    if(!canvasRef.current||!quotes.length)return;
    if(chartRef.current)chartRef.current.destroy();

    const fwdNames=[...new Set(quotes.map(q=>q.forwarder))].slice(0,6);
    const monthKeys=[...new Set(quotes.map(q=>(q.date||"").slice(0,7)))].sort();

    const colors=["#3b82f6","#a855f7","#10b981","#f59e0b","#ef4444","#06b6d4"];
    const datasets=fwdNames.map((name,i)=>({
      label:name,
      data:monthKeys.map(m=>{
        const qs=quotes.filter(q=>q.forwarder===name&&(q.date||"").startsWith(m)&&q.freight20);
        if(!qs.length)return null;
        return Math.round(qs.reduce((s,q)=>s+parseFloat(q.freight20),0)/qs.length);
      }),
      borderColor:colors[i],backgroundColor:colors[i]+"33",
      tension:0.3,pointRadius:4,spanGaps:true,
    }));

    chartRef.current=new Chart(canvasRef.current,{
      type:"line",
      data:{labels:monthKeys.map(m=>{const[y,mo]=m.split("-");return `${MONTHS[parseInt(mo)-1]} ${y}`;}),datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:dark?"#cbd5e1":"#374151",font:{size:11}}},
          tooltip:{mode:"index",intersect:false}},
        scales:{
          x:{grid:{color:dark?"#1e293b":"#f1f5f9"},ticks:{color:dark?"#94a3b8":"#6b7280"}},
          y:{grid:{color:dark?"#1e293b":"#f1f5f9"},ticks:{color:dark?"#94a3b8":"#6b7280"},title:{display:true,text:"20ft Rate (USD)",color:dark?"#94a3b8":"#6b7280"}}
        }
      }
    });
    return()=>chartRef.current?.destroy();
  },[quotes,dark]);

  if(!quotes.length)return null;
  return(
    <div className={`rounded-2xl p-4 mb-5 shadow-md ${dark?"bg-slate-800":"bg-white"} border ${dark?"border-slate-700":"border-gray-100"}`}>
      <h3 className={`text-sm font-bold mb-3 ${dark?"text-slate-200":"text-gray-700"}`}>📈 Price Trend — 20ft Rate by Forwarder</h3>
      <div style={{height:240}}><canvas ref={canvasRef}/></div>
    </div>
  );
}

// ── Month Compare ──────────────────────────────────────
function MonthCompare({quotes}){
  const{dark}=useDark();
  const months=[...new Set(quotes.map(q=>(q.date||"").slice(0,7)))].sort().reverse().slice(0,6);
  const [mA,setMA]=React.useState(months[1]||"");
  const [mB,setMB]=React.useState(months[0]||"");
  const sel=`w-full border rounded-lg px-2 py-1.5 text-sm ${dark?"bg-slate-700 border-slate-600 text-slate-100":"bg-white border-gray-300 text-gray-800"}`;

  const stats=(m)=>{
    const qs=quotes.filter(q=>(q.date||"").startsWith(m)&&q.freight20);
    if(!qs.length)return null;
    const avg=Math.round(qs.reduce((s,q)=>s+parseFloat(q.freight20),0)/qs.length);
    const min=Math.min(...qs.map(q=>parseFloat(q.freight20)));
    const max=Math.max(...qs.map(q=>parseFloat(q.freight20)));
    return{avg,min,max,count:qs.length};
  };
  const sA=stats(mA),sB=stats(mB);
  const diff=sA&&sB?sB.avg-sA.avg:null;

  return(
    <div className={`rounded-2xl p-4 mb-5 shadow-md ${dark?"bg-slate-800":"bg-white"} border ${dark?"border-slate-700":"border-gray-100"}`}>
      <h3 className={`text-sm font-bold mb-3 ${dark?"text-slate-200":"text-gray-700"}`}>📊 Month vs Month Comparison</h3>
      <div className="grid grid-cols-2 gap-3 mb-4">
        <div><label className={`text-xs ${dark?"text-slate-400":"text-gray-500"}`}>Month A</label><select className={sel} value={mA} onChange={e=>setMA(e.target.value)}><option value="">—</option>{months.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
        <div><label className={`text-xs ${dark?"text-slate-400":"text-gray-500"}`}>Month B</label><select className={sel} value={mB} onChange={e=>setMB(e.target.value)}><option value="">—</option>{months.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
      </div>
      {sA&&sB?(
        <div className="grid grid-cols-3 gap-3">
          {[
            {label:"Avg 20ft Rate",a:sA.avg,b:sB.avg,fmt:v=>`$${v.toLocaleString()}`},
            {label:"Lowest 20ft",a:sA.min,b:sB.min,fmt:v=>`$${v.toLocaleString()}`},
            {label:"Quotes Count",a:sA.count,b:sB.count,fmt:v=>v},
          ].map(({label,a,b,fmt})=>{
            const chg=b-a;const pct=a?Math.round(chg/a*100):0;
            return(
              <div key={label} className={`rounded-xl p-3 ${dark?"bg-slate-700":"bg-gray-50"}`}>
                <div className={`text-xs mb-1 ${dark?"text-slate-400":"text-gray-400"}`}>{label}</div>
                <div className="flex justify-between text-xs mb-1">
                  <span className={dark?"text-slate-300":"text-gray-600"}>{mA}: <b>{fmt(a)}</b></span>
                  <span className={dark?"text-slate-300":"text-gray-600"}>{mB}: <b>{fmt(b)}</b></span>
                </div>
                <div className={`text-sm font-bold ${chg>0?"text-red-500":chg<0?"text-green-500":"text-gray-400"}`}>
                  {chg>0?"▲":"▼"} {Math.abs(pct)}% ({chg>0?"+":""}{fmt(chg)})
                </div>
              </div>
            );
          })}
        </div>
      ):<p className={`text-sm ${dark?"text-slate-400":"text-gray-400"}`}>Select two months to compare.</p>}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────
function App(){
  const [dark,setDark]=React.useState(()=>localStorage.getItem("dark")==="1");
  const [authed,setAuthed]=React.useState(false);
  const [pwInput,setPwInput]=React.useState("");
  const [pwErr,setPwErr]=React.useState(false);

  const [data,setData]=React.useState({quotes:[],drafts:[],forwarders:[],lines:[],projects:[]});
  const [tab,setTab]=React.useState("dashboard");
  const [form,setForm]=React.useState({...emptyForm});
  const [formMode,setFormMode]=React.useState(null);
  const [editId,setEditId]=React.useState(null);
  const [editDraftId,setEditDraftId]=React.useState(null);
  const [sortBy,setSortBy]=React.useState("grand");
  const [search,setSearch]=React.useState("");
  const [filterFwd,setFilterFwd]=React.useState("");
  const [filterLine,setFilterLine]=React.useState("");
  const [pasteOpen,setPasteOpen]=React.useState(false);
  const [pasteText,setPasteText]=React.useState("");
  const [parsing,setParsing]=React.useState(false);
  const [parseError,setParseError]=React.useState("");
  const [parsed,setParsed]=React.useState(null);
  const [apiKey,setApiKey]=React.useState(()=>localStorage.getItem("gemini_key")||"");
  const [showKeyModal,setShowKeyModal]=React.useState(false);
  const [fwdModal,setFwdModal]=React.useState(null);
  const [lineModal,setLineModal]=React.useState(null);
  const [projectModal,setProjectModal]=React.useState(null);
  const [fwdForm,setFwdForm]=React.useState({...emptyFwd});
  const [lineForm,setLineForm]=React.useState({...emptyLine});
  const [projectForm,setProjectForm]=React.useState({...emptyProject});
  const [historyModal,setHistoryModal]=React.useState(null);
  const [activeProject,setActiveProject]=React.useState(null);
  const [reqForm,setReqForm]=React.useState({...emptyRequest});
  const formRef=React.useRef();

  React.useEffect(()=>{
    try{const s=localStorage.getItem(SK);if(s){const d=JSON.parse(s);setData({quotes:d.quotes||[],drafts:d.drafts||[],forwarders:d.forwarders||[],lines:d.lines||[],projects:d.projects||[]});}}catch{}
  },[]);

  const toggleDark=()=>{const nd=!dark;setDark(nd);localStorage.setItem("dark",nd?"1":"0");};
  const persist=(patch)=>{const nd={...data,...patch};setData(nd);try{localStorage.setItem(SK,JSON.stringify(nd));}catch{}};

  const bg=dark?"bg-slate-900 text-slate-100":"bg-gray-50 text-gray-900";
  const card=dark?"bg-slate-800 border-slate-700":"bg-white border-gray-100";
  const inp=`w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 ${dark?"bg-slate-700 border-slate-600 text-slate-100 placeholder-slate-400":"bg-white border-gray-300 text-gray-800"}`;
  const thC=dark?"bg-slate-700 text-slate-200":"bg-gray-800 text-white";

  const upd=(k,v)=>setForm(p=>({...p,[k]:v}));
  const resetForm=()=>{setForm({...emptyForm});setEditId(null);setEditDraftId(null);setFormMode(null);};
  const openForm=(mode,targetTab,defaults={})=>{resetForm();setForm(p=>({...p,...defaults}));setTab(targetTab);setFormMode(mode);setTimeout(()=>formRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),120);};

  const enrichQ=(f,id)=>({...f,id:id||Date.now(),date:f.date||new Date().toISOString().slice(0,10),total20:calcTotal(f,"20"),total40:calcTotal(f,"40"),grand:calcGrand(f)});

  const handleSaveQuote=()=>{
    if(!form.forwarder.trim()){alert("Forwarder required.");return;}
    const rec=enrichQ(form,editId);
    persist({quotes:editId?data.quotes.map(q=>q.id===editId?rec:q):[...data.quotes,rec]});
    resetForm();setTab("dashboard");
  };
  const handleSaveDraft=()=>{
    if(!form.forwarder.trim()&&!form.line.trim()){alert("Enter forwarder or line.");return;}
    const rec=enrichQ(form,editDraftId);
    persist({drafts:editDraftId?data.drafts.map(d=>d.id===editDraftId?rec:d):[...data.drafts,rec]});
    resetForm();setTab("drafts");
  };
  const promoteDraft=(d)=>{persist({quotes:[...data.quotes,enrichQ(d,Date.now())],drafts:data.drafts.filter(x=>x.id!==d.id)});setTab("dashboard");};
  const editQuote=(q)=>{setForm({...emptyForm,...q});setEditId(q.id);setFormMode("quote");setTab("dashboard");setTimeout(()=>formRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),120);};
  const editDraftFn=(d)=>{setForm({...emptyForm,...d});setEditDraftId(d.id);setFormMode("draft");setTab("drafts");setTimeout(()=>formRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),120);};
  const dupQuote=(q)=>{const rec=enrichQ({...q,date:new Date().toISOString().slice(0,10)},Date.now());persist({quotes:[...data.quotes,rec]});};

  // Forwarder
  const saveFwd=()=>{if(!fwdForm.name.trim()){alert("Name required.");return;}const rec={...fwdForm,id:fwdForm.id||Date.now()};persist({forwarders:fwdForm.id?data.forwarders.map(f=>f.id===fwdForm.id?rec:f):[...data.forwarders,rec]});setFwdModal(null);setFwdForm({...emptyFwd});};
  const deleteFwd=(id)=>{if(window.confirm("Delete forwarder?"))persist({forwarders:data.forwarders.filter(f=>f.id!==id)});};

  // Line
  const saveLine=()=>{if(!lineForm.name.trim()){alert("Name required.");return;}const rec={...lineForm,id:lineForm.id||Date.now()};persist({lines:lineForm.id?data.lines.map(l=>l.id===lineForm.id?rec:l):[...data.lines,rec]});setLineModal(null);setLineForm({...emptyLine});};
  const deleteLine=(id)=>{if(window.confirm("Delete line?"))persist({lines:data.lines.filter(l=>l.id!==id)});};

  // Project
  const saveProject=()=>{
    if(!projectForm.name.trim()){alert("Project name required.");return;}
    const rec={...projectForm,id:projectForm.id||Date.now(),requests:projectForm.requests||[]};
    persist({projects:projectForm.id?data.projects.map(p=>p.id===projectForm.id?rec:p):[...data.projects,rec]});
    setProjectModal(null);setProjectForm({...emptyProject});
  };
  const deleteProject=(id)=>{if(window.confirm("Delete project?"))persist({projects:data.projects.filter(p=>p.id!==id)});};
  const addRequest=()=>{
    if(!reqForm.description.trim())return;
    const req={...reqForm,id:Date.now()};
    setProjectForm(p=>({...p,requests:[...(p.requests||[]),req]}));
    setReqForm({...emptyRequest});
  };
  const removeRequest=(rid)=>setProjectForm(p=>({...p,requests:p.requests.filter(r=>r.id!==rid)}));

  // Quotes filtered/sorted
  const allQuotes=[...data.quotes].map(q=>({...q,total20:calcTotal(q,"20"),total40:calcTotal(q,"40"),grand:calcGrand(q)}));
  const sorted=allQuotes
    .filter(q=>{
      const s=search.toLowerCase();
      const matchSearch=!s||(q.forwarder+q.line+q.pol+q.pod+q.remarks).toLowerCase().includes(s);
      const matchFwd=!filterFwd||q.forwarder===filterFwd;
      const matchLine=!filterLine||q.line===filterLine;
      return matchSearch&&matchFwd&&matchLine;
    })
    .sort((a,b)=>sortBy==="grand"?a.grand-b.grand:sortBy==="total20"?a.total20-b.total20:sortBy==="total40"?a.total40-b.total40:sortBy==="etd"?(a.etd||"").localeCompare(b.etd||""):(a.transitTime||0)-(b.transitTime||0));

  const bestGrandId=sorted.filter(q=>q.grand>0).sort((a,b)=>a.grand-b.grand)[0]?.id;
  const best20Id=sorted.filter(q=>q.total20>0).sort((a,b)=>a.total20-b.total20)[0]?.id;
  const best40Id=sorted.filter(q=>q.total40>0).sort((a,b)=>a.total40-b.total40)[0]?.id;

  const getFwdHistory=(name)=>allQuotes.filter(q=>q.forwarder===name).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const getLineHistory=(name)=>allQuotes.filter(q=>q.line===name).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const getProjectQuotes=(pid)=>allQuotes.filter(q=>q.projectId===String(pid));

  // AI Parse
  const handleParse=async()=>{
    if(!pasteText.trim())return;
    if(!apiKey){setShowKeyModal(true);return;}
    setParsing(true);setParseError("");setParsed(null);
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{parts:[{text:`Extract freight quote data. Return ONLY a JSON array. Keys: forwarder, forwarderCode, line, lineCode, pol, pod, freight20, freight40hq, thc20, thc40hq, qty20, qty40hq, otherCharges, currency (default USD), etd (YYYY-MM-DD), cutoff (YYYY-MM-DD), validityDate (YYYY-MM-DD), freeDays, transitTime, remarks. Empty string if not found. Raw JSON only.\n\n${pasteText}`}]}]})
      });
      const d=await res.json();
      const text=d.candidates?.[0]?.content?.parts?.[0]?.text||"";
      if(!text)throw new Error();
      const clean=text.replace(/```json/gi,"").replace(/```/g,"").trim();
      const s=clean.indexOf("["),e=clean.lastIndexOf("]");
      const arr=JSON.parse(clean.slice(s,e+1));
      setParsed(arr.map(q=>({...emptyForm,...q,id:Date.now()+Math.random(),date:new Date().toISOString().slice(0,10),total20:calcTotal(q,"20"),total40:calcTotal(q,"40"),grand:calcGrand(q)})));
    }catch{setParseError("Could not parse. Check input or API key.");}
    setParsing(false);
  };
  const confirmParsed=(asDraft=false)=>{
    if(!parsed)return;
    if(asDraft)persist({drafts:[...data.drafts,...parsed]});
    else persist({quotes:[...data.quotes,...parsed]});
    setParsed(null);setPasteText("");setPasteOpen(false);
  };

  // Export
  const exportCSV=()=>{
    const cols=["#","Date","Forwarder","FwdCode","Line","LineCode","POL","POD","Qty20","20Rate","20THC","Tot20","Qty40","40Rate","40THC","Tot40","Other","Grand","CCY","ETD","Cutoff","FreeDays","Transit","Validity","Remarks","Project"];
    const rows=sorted.map((q,i)=>{const pr=data.projects.find(p=>String(p.id)===String(q.projectId));return[i+1,q.date||"",q.forwarder,q.forwarderCode||"",q.line||"",q.lineCode||"",q.pol||"",q.pod||"",q.qty20||"",q.freight20||"",q.thc20||"",q.total20||"",q.qty40hq||"",q.freight40hq||"",q.thc40hq||"",q.total40||"",q.otherCharges||"",q.grand||"",q.currency,q.etd||"",q.cutoff||"",q.freeDays||"",q.transitTime||"",q.validityDate||"",q.remarks||"",pr?pr.name:""];});
    const csv=[cols,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="freight_rates.csv";a.click();
  };
  const exportJSON=()=>{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));a.download="freight_backup.json";a.click();};
  const importJSON=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);persist(d);alert("Data imported!");}catch{alert("Invalid file.");}};r.readAsText(f);};

  // ── Login Screen ───────────────────────────────────
  if(!authed){
    return(
      <div className={`min-h-screen flex items-center justify-center ${dark?"bg-slate-900":"bg-gray-100"}`}>
        <div className={`rounded-2xl shadow-xl p-8 w-80 ${dark?"bg-slate-800":"bg-white"}`}>
          <div className="text-center mb-6">
            <div className="text-5xl mb-2">🚢</div>
            <h1 className={`text-xl font-bold ${dark?"text-slate-100":"text-gray-800"}`}>Freight Dashboard</h1>
            <p className={`text-sm ${dark?"text-slate-400":"text-gray-400"}`}>Enter password to continue</p>
          </div>
          <input type="password" className={`${inp} mb-3`} placeholder="Password" value={pwInput}
            onChange={e=>setPwInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"){if(pwInput===PASSWORD)setAuthed(true);else setPwErr(true);}}}/>
          {pwErr&&<p className="text-red-500 text-xs mb-2">Incorrect password.</p>}

            <div><span className={dark?"text-slate-400":"text-gray-400"}>Phone: </span><b>{profile?.phone||"—"}</b></div>

                <tbody>

                      <td className="px-2 py-1.5 font-semibold">{q.forwarder}</td>

                      <td className="px-2 py-1.5">{q.pol||"—"}→{q.pod||"—"}</td>
                      <td className="px-2 py-1.5 text-blue-500 font-medium">{q.freight20||"—"}</td>
                      <td className="px-2 py-1.5 text-blue-400">{q.thc20||"—"}</td>
                      <td className="px-2 py-1.5 text-purple-500 font-medium">{q.freight40hq||"—"}</td>
                      <td className="px-2 py-1.5 text-purple-400">{q.thc40hq||"—"}</td>
                      <td className="px-2 py-1.5 font-bold">{q.grand?.toLocaleString()||"—"}</td>
                      <td className="px-2 py-1.5">{q.currency}</td>
                      <td className="px-2 py-1.5">{q.etd||"—"}</td>
                    </tr>

                </tbody>
              </table>

              <div className="grid grid-cols-3 gap-3">

                  {label:"Lowest 40HQ Rate",val:qs.filter(q=>q.freight40hq).length?`$${Math.min(...qs.filter(q=>q.freight40hq).map(q=>parseFloat(q.freight40hq))).toLocaleString()}`:"—",color:"text-green-500"},
                  {label:"Avg Grand Total",val:`$${Math.round(qs.reduce((s,q)=>s+(q.grand||0),0)/qs.length).toLocaleString()}`,color:"text-blue-500"},

                              <td className={`px-3 py-2 text-center ${dark?"text-slate-400":"text-gray-400"}`}>{q.currency}</td>
                              <td className={`px-3 py-2 whitespace-nowrap ${dark?"text-slate-300":"text-gray-600"}`}>{q.etd||"—"}</td>
                              <td className="px-3 py-2 text-orange-500 font-medium whitespace-nowrap">{q.cutoff||"—"}</td>
                              <td className="px-3 py-2 text-center">{q.freeDays?`${q.freeDays}d`:"—"}</td>
                              <td className="px-3 py-2 text-center">{q.transitTime?`${q.transitTime}d`:"—"}</td>
                              <td className="px-3 py-2 text-xs">{pr?<span className="text-blue-400">📁 {pr.name}</span>:"—"}</td>
                              <td className="px-3 py-2 whitespace-nowrap">
                                <button onClick={()=>editQuote(q)} className="text-blue-400 text-xs mr-1">✏️</button>
                                <button onClick={()=>dupQuote(q)} className="text-gray-400 text-xs mr-1" title="Duplicate">⧉</button>
                                <button onClick={()=>persist({quotes:data.quotes.filter(x=>x.id!==q.id)})} className="text-red-400 text-xs">🗑</button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* Mobile Cards */}
                <div className="md:hidden grid gap-3">
                  {sorted.map((q,i)=>{
                    const isB=q.id===bestGrandId;
                    const pr=data.projects.find(p=>String(p.id)===String(q.projectId));
                    return(
                      <div key={q.id} className={`rounded-xl p-4 shadow-sm border ${card} ${isB?"border-green-500":""}`}>
                        <div className="flex justify-between items-start mb-2">
                          <div>
                            <span className="font-bold">{q.forwarder}</span>
                            {isB&&<span className="ml-1 text-xs bg-green-500 text-white px-1.5 py-0.5 rounded-full">BEST</span>}
                            <p className={`text-xs ${dark?"text-slate-400":"text-gray-400"}`}>{q.line||"—"} · {q.date||""}</p>
                            {q.pol&&<p className={`text-xs ${dark?"text-slate-400":"text-gray-400"}`}>{q.pol} → {q.pod}</p>}
                          </div>
                          <div className="text-right">
                            <div className="text-lg font-bold text-green-500">{q.grand>0?`${q.grand.toLocaleString()} ${q.currency}`:"—"}</div>
                            <div className={`text-xs ${dark?"text-slate-400":"text-gray-400"}`}>Grand Total</div>
                          </div>
                        </div>
                        <div className="grid grid-cols-2 gap-2 text-xs mb-2">
                          <div className={`rounded-lg p-2 ${dark?"bg-blue-900":"bg-blue-50"}`}>
                            <div className="text-blue-500 font-semibold">20ft</div>
                            <div>Rate: <b>{q.freight20||"—"}</b></div>
                            <div>THC: <b>{q.thc20||"—"}</b></div>
                            <div>Qty: <b>{q.qty20||"—"}</b></div>
                            <div className="font-bold text-blue-600">Tot: {q.total20>0?q.total20.toLocaleString():"—"}</div>
                          </div>
                          <div className={`rounded-lg p-2 ${dark?"bg-purple-900":"bg-purple-50"}`}>
                            <div className="text-purple-500 font-semibold">40HQ</div>
                            <div>Rate: <b>{q.freight40hq||"—"}</b></div>
                            <div>THC: <b>{q.thc40hq||"—"}</b></div>
                            <div>Qty: <b>{q.qty40hq||"—"}</b></div>
                            <div className="font-bold text-purple-600">Tot: {q.total40>0?q.total40.toLocaleString():"—"}</div>
                          </div>
                        </div>
                        <div className={`flex gap-3 text-xs mb-2 ${dark?"text-slate-400":"text-gray-500"}`}>
                          {q.etd&&<span>ETD: {q.etd}</span>}
                          {q.cutoff&&<span className="text-orange-500">Cut: {q.cutoff}</span>}
                          {q.freeDays&&<span>{q.freeDays}d free</span>}
                          {q.transitTime&&<span>{q.transitTime}d transit</span>}
                          {pr&&<span className="text-blue-400">📁 {pr.name}</span>}
                        </div>
                        <div className="flex gap-2">
                          <Btn color="ghost" size="xs" onClick={()=>editQuote(q)}>✏️ Edit</Btn>
                          <Btn color="ghost" size="xs" onClick={()=>dupQuote(q)}>⧉ Dup</Btn>
                          <Btn color="ghost" size="xs" onClick={()=>persist({quotes:data.quotes.filter(x=>x.id!==q.id)})}>🗑</Btn>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Summary */}
                {sorted.length>1&&(
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mt-4">
                    {[
                      {label:"Best Grand",val:Math.min(...sorted.filter(q=>q.grand>0).map(q=>q.grand)).toLocaleString(),color:"text-green-500",icon:"🏆"},
                      {label:"Best 20ft",val:Math.min(...sorted.filter(q=>q.total20>0).map(q=>q.total20)).toLocaleString(),color:"text-blue-500",icon:"📦"},
                      {label:"Best 40HQ",val:Math.min(...sorted.filter(q=>q.total40>0).map(q=>q.total40)).toLocaleString(),color:"text-purple-500",icon:"🏗️"},
                      {label:"Avg Grand",val:Math.round(sorted.filter(q=>q.grand>0).reduce((s,q)=>s+q.grand,0)/Math.max(sorted.filter(q=>q.grand>0).length,1)).toLocaleString(),color:dark?"text-slate-300":"text-gray-600",icon:"📊"},
                    ].map(({label,val,color,icon})=>(
                      <div key={label} className={`rounded-xl shadow border p-4 text-center ${card}`}>
                        <div className="text-xl mb-1">{icon}</div>
                        <div className={`text-xl font-bold ${color}`}>{val}</div>
                        <div className={`text-xs mt-1 ${dark?"text-slate-400":"text-gray-400"}`}>{label}</div>
                      </div>
                    ))}
                  </div>
                )}
              </>
            ):(
              <div className={`text-center py-20 rounded-2xl border ${card}`}>
                <div className="text-5xl mb-3">🚢</div>
                <p className="text-lg font-semibold">No quotes yet</p>
                <p className={`text-sm ${dark?"text-slate-400":"text-gray-400"}`}>Click ＋ New to get started</p>
              </div>
            )}
          </>
        )}
      </div>
    </div>
    </DarkCtx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
